services:
  - type: web
    name: securevault-pay-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_ORIGIN
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
